version: "2"
run:
  build-tags:
    - cuda
linters:
  enable:
    - copyloopvar
    - gocritic
    - gosec
    - prealloc
    - revive
  settings:
    gocritic:
      disabled-checks:
        - dupSubExpr
        - exitAfterDefer
    gosec:
      excludes:
        - G104
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - revive
        text: 'exported: exported (const|var)'
    paths:
      - vendor
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 50
  max-same-issues: 5
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - vendor
      - third_party$
      - builtin$
      - examples$
